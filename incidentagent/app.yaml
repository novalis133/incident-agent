name: incidentiq
region: nyc
services:
  - name: api
    github:
      repo: novalis133/incident-agent
      branch: main
      deploy_on_push: true
    source_dir: /incidentagent
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    run_command: uvicorn incidentagent.api.app:app --host 0.0.0.0 --port 8000
    envs:
      - key: PYTHONPATH
        value: /app
      - key: DEMO_MODE
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_MODEL
        value: claude-sonnet-4-20250514
      - key: LLM_PROVIDER
        value: gradient
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
    routes:
      - path: /api

  - name: dashboard
    github:
      repo: novalis133/incident-agent
      branch: main
      deploy_on_push: true
    source_dir: /incidentagent
    dockerfile_path: Dockerfile
    http_port: 8501
    instance_count: 1
    instance_size_slug: professional-xs
    run_command: streamlit run incidentagent/ui/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    envs:
      - key: PYTHONPATH
        value: /app
      - key: DEMO_MODE
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: API_URL
        value: ${api.PRIVATE_URL}
    routes:
      - path: /
